services:
  - type: web
    name: via-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt -c requirements.lock
    startCommand: PYTHONPATH=. python -m alembic upgrade head && PYTHONPATH=. python scripts/seed_admin_user.py && PYTHONPATH=. python scripts/seed_prod_rulebooks.py && PYTHONPATH=. python -m uvicorn via.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: via-postgres
          property: connectionString
      - key: GEE_ENABLED
        value: "true"
      - key: GEE_PROJECT
        sync: false
      - key: GEE_SERVICE_ACCOUNT
        sync: false
      - key: GEE_PRIVATE_KEY_JSON
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: RELAY_WORKER_POLL_INTERVAL_SECONDS
        value: "1"
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: LLM_DRAFTING_PROVIDER
        value: "tavily_rag"
      - key: LLM_TIMEOUT_SECONDS
        value: "120"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_RAG_MODEL
        value: "gpt-4o-mini"
      - key: OPENAI_FILE_SEARCH_MAX_RESULTS
        value: "15"
      - key: OPENAI_FILE_SEARCH_PROMPT_VERSION
        value: "via-rag-v1"
      - key: OPENAI_WEB_SEARCH_ENABLED
        value: "true"
      - key: OPENAI_WEB_SEARCH_ALLOWED_DOMAINS
        value: "midagri.gob.pe,inia.gob.pe,senasa.gob.pe,senamhi.gob.pe,agrorural.gob.pe,lamolina.edu.pe,fao.org,iica.int,cgiar.org,cabi.org,inta.gob.ar,intagri.com,infoagro.com,ivia.gva.es,scielo.org,redalyc.org"
      - key: OPENAI_WEB_SEARCH_CONTEXT_SIZE
        value: "medium"
      - key: OPENAI_WEB_SEARCH_COUNTRY
        value: "PE"
      - key: OPENAI_WEB_SEARCH_REGION
        value: "Lima"
      - key: TAVILY_API_KEY
        sync: false
      - key: TAVILY_MAX_RESULTS
        value: "5"
      - key: TAVILY_SEARCH_DEPTH
        value: "advanced"
      - key: JINA_READER_ENABLED
        value: "true"
      - key: JINA_READER_MAX_URLS
        value: "3"
      - key: JINA_READER_TIMEOUT_SECONDS
        value: "20"
      - key: VIA_VECTOR_STORE_MAIZ_AMARILLO_DURO_ID
        sync: false
      - key: VIA_VECTOR_STORE_PALTA_HASS_ID
        sync: false
      - key: VIA_VECTOR_STORE_MANDARINA_MURCOTT_ID
        sync: false
      - key: VIA_VECTOR_STORE_MARACUYA_CRIOLLA_AMARILLA_ID
        sync: false
      - key: VIA_VECTOR_STORE_UVA_DE_MESA_SWEET_GLOBE_ID
        sync: false

databases:
  - name: via-postgres
    databaseName: via_production
    user: via_user
    plan: free
